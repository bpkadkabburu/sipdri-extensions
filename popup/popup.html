<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SIPD-RI Sub Kegiatan</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            width: 260px;
            padding: 16px;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            font-size: 13px;
        }
        h1 { font-size: 13px; font-weight: 700; color: #7c9eff; margin-bottom: 12px; }

        .token-status {
            display: flex;
            align-items: flex-start;
            gap: 9px;
            background: #1e293b;
            border-radius: 7px;
            padding: 10px 12px;
            margin-bottom: 12px;
            font-size: 12px;
            border-left: 3px solid #334155;
            transition: border-color 0.2s;
        }
        .token-status.ok { border-left-color: #22c55e; }
        .token-status.no { border-left-color: #f59e0b; }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
            margin-top: 3px;
            background: #475569;
        }
        .dot.ok { background: #22c55e; }
        .dot.no { background: #f59e0b; }

        #token-text { color: #94a3b8; line-height: 1.5; }
        #token-text.ok { color: #86efac; }

        .info {
            background: #1e293b;
            border-radius: 7px;
            padding: 11px 12px;
            font-size: 12px;
            color: #94a3b8;
            line-height: 1.55;
            margin-bottom: 12px;
        }
        .info b { color: #e2e8f0; }

        button {
            width: 100%;
            padding: 9px;
            background: #1e293b;
            color: #94a3b8;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
        }
        button:hover { background: #334155; color: #e2e8f0; }
    </style>
</head>
<body>
    <h1>SIPD-RI Sub Kegiatan</h1>

    <div id="token-status" class="token-status">
        <div class="dot" id="token-dot"></div>
        <span id="token-text">Memeriksa token...</span>
    </div>

    <div class="info">
        Klik ikon <b>📋</b> di halaman SIPD-RI untuk membuka panel ambil data.
    </div>

    <button id="btn-options">⚙ Pengaturan Default</button>
    <script src="popup.js"></script>
</body>
</html>
